KVQoFCgUKBQoFCgUKBQoFCgUOBMUOD/BwAA//8IHrxMAAAABklEQVQDAOgBQKH1w7T1AAAAAElFTkSuQmCC");

      background-repeat: no-repeat;
      background-position: center center;
    }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20,20,20,0.45);
    }
    .login-card {
      position: relative;
      z-index: 2;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 370px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }
    .login-titulo {
      text-align: center;
      color: #fff;
      font-size: 1.2rem;
      font-weight: 800;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 12px rgba(0,0,0,0.6);
      letter-spacing: 0.3px;
    }
    .login-sub {
      text-align: center;
      color: rgba(255,255,255,0.7);
      font-size: 0.78rem;
      margin-bottom: 1.5rem;
    }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      margin-bottom: 0.3rem;
      display: block;
    }
    .form-control {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      color: #fff;
      padding: 0.65rem 0.85rem;
      font-size: 0.875rem;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.4); }
    .form-control:focus {
      background: rgba(255,255,255,0.22);
      border-color: rgba(255,255,255,0.55);
      box-shadow: none;
      color: #fff;
    }
    .btn-login {
      background: linear-gradient(135deg, #1d4ed8, #2563eb);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.8rem;
      font-weight: 700;
      width: 100%;
      font-size: 0.95rem;
      transition: all 0.2s;
      margin-top: 0.75rem;
      box-shadow: 0 4px 15px rgba(29,78,216,0.4);
      letter-spacing: 0.3px;
    }
    .btn-login:hover {
      background: linear-gradient(135deg, #1e40af, #1d4ed8);
      color: #fff;
      box-shadow: 0 6px 20px rgba(29,78,216,0.5);
      transform: translateY(-1px);
    }
    .erro-box {
      background: rgba(220,38,38,0.2);
      border: 1px solid rgba(220,38,38,0.4);
      color: #fca5a5;
      border-radius: 8px;
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="login-card">
    <div class="login-titulo">JR Produtos de Limpeza</div>
    <div class="login-sub">Sistema de gestão</div>

    {% if form.errors %}
      <div class="erro-box">
        <i class="bi bi-exclamation-circle me-1"></i> Usuário ou senha incorretos.
      </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username">Usuário</label>
        <input type="text" name="username" id="id_username" class="form-control" placeholder="seu.usuario" autofocus>
      </div>
      <div class="mb-2">
        <label for="id_password">Senha</label>
        <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••">
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
      <input type="hidden" name="next" value="{{ next }}">
    </form>
  </div>
</body>
</html>
